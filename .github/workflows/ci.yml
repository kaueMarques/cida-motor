name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install -r requirements-ci.txt

    - name: Display environment evidence
      shell: bash
      run: |
        echo "=== ENVIRONMENT EVIDENCE ==="
        echo "Commit SHA: ${{ github.sha }}"
        echo "Go Version:"
        go version
        echo "Python Version:"
        python --version
        echo "Tokenizer cached database size and SHA-1:"
        ls -lh resources/
        sha1sum resources/9b5ad71b2ce5302211f9c61530b329a4922fc6a4 || true

    - name: Run Go tests
      run: go test ./... -count=1 -v

    - name: Run Python tests
      run: python -m pytest -q

    - name: Clean Workspace Gate
      run: python scripts/check_clean_workspace.py

  benchmark:
    name: Benchmark on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install -r requirements-ci.txt

    - name: Run Benchmarks and Generate Manifest
      run: python benchmarks/benchmark_runner.py --manifest-out manifest-${{ matrix.os }}.json

    - name: Clean Workspace Gate
      run: python scripts/check_clean_workspace.py

    - name: Upload Manifest Artifact
      uses: actions/upload-artifact@v4
      with:
        name: manifest-${{ matrix.os }}
        path: manifest-${{ matrix.os }}.json

  compare:
    name: Compare Manifests
    runs-on: ubuntu-latest
    needs: benchmark
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install -r requirements-ci.txt

    - name: Download Ubuntu Manifest
      uses: actions/download-artifact@v4
      with:
        name: manifest-ubuntu-latest
        path: manifest-ubuntu-latest

    - name: Download Windows Manifest
      uses: actions/download-artifact@v4
      with:
        name: manifest-windows-latest
        path: manifest-windows-latest

    - name: Cross-Platform Equivalence Check
      run: |
        python scripts/compare_manifests.py \
          manifest-ubuntu-latest/manifest-ubuntu-latest.json \
          manifest-windows-latest/manifest-windows-latest.json \
          --strict

    - name: Compare with Base Branch (PR only)
      if: github.event_name == 'pull_request'
      run: |
        echo "Fetching base branch ${{ github.base_ref }}..."
        git fetch origin ${{ github.base_ref }}
        
        # Checkout base ref to temporary folder to run benchmark there
        mkdir -p /tmp/base-code
        git archive origin/${{ github.base_ref }} | tar -x -C /tmp/base-code
        
        echo "Running benchmark on base branch..."
        cd /tmp/base-code
        python -m pip install -r requirements-ci.txt
        python benchmarks/benchmark_runner.py --manifest-out /tmp/manifest-base.json
        
        echo "Comparing PR manifest with base branch manifest..."
        cd $GITHUB_WORKSPACE
        python scripts/compare_manifests.py /tmp/manifest-base.json manifest-ubuntu-latest/manifest-ubuntu-latest.json || true
