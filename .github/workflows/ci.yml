name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install tiktoken==0.7.0 pyyaml==6.0.1 pytest==9.0.2

    - name: Display environment evidence
      shell: bash
      run: |
        echo "=== ENVIRONMENT EVIDENCE ==="
        echo "Commit SHA: ${{ github.sha }}"
        echo "Go Version:"
        go version
        echo "Python Version:"
        python --version
        echo "Tokenizer cached database size and SHA-1:"
        ls -lh resources/
        sha1sum resources/9b5ad71b2ce5302211f9c61530b329a4922fc6a4 || true

    - name: Run Go tests
      run: go test ./... -count=1 -v

    - name: Run Python tests
      run: python -m pytest -q

    - name: Run Benchmarks and Determinism Verification
      run: python benchmarks/benchmark_runner.py

    - name: Verify clean workspace (No untracked or modified files)
      shell: bash
      run: |
        echo "=== CLEAN WORKSPACE CHECK ==="
        git status --porcelain
        git diff --exit-code
