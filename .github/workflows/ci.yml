name: CI

on:
  push:
    branches: [ main, feat/bmad-markdown-token-optimizer ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tiktoken pyyaml

    - name: Run Go tests
      run: go test ./...

    - name: Run Python tests
      run: python -m unittest discover -s tests -p "test_*.py" -v

    - name: Run Benchmarks and Determinism Verification
      run: python benchmarks/benchmark_runner.py
